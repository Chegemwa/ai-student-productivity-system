<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#312e81"/>

  <!-- Subtle inner border -->
  <rect x="2.5" y="2.5" width="95" height="95" rx="18" fill="none" stroke="#4f46e5" stroke-width="1.5" opacity="0.55"/>

  <!-- Graduation cap brim -->
  <polygon points="50,18 85,35 50,52 15,35" fill="#ffffff" opacity="0.97"/>

  <!-- Cap brim shine -->
  <polygon points="50,18 85,35 67,43 50,35 33,43 15,35" fill="#c7d2fe" opacity="0.3"/>

  <!-- Cap top button -->
  <circle cx="50" cy="13" r="5" fill="#a5b4fc"/>
  <circle cx="50" cy="13" r="2.5" fill="#ffffff" opacity="0.75"/>

  <!-- Tassel cord -->
  <path d="M85,35 C87,42 87,50 86,58" stroke="#a5b4fc" stroke-width="3.5" fill="none" stroke-linecap="round"/>

  <!-- Tassel bob -->
  <circle cx="86" cy="63" r="7" fill="#818cf8"/>
  <circle cx="84" cy="61" r="2.2" fill="#ffffff" opacity="0.8"/>

  <!-- Tassel fringe -->
  <line x1="81" y1="69" x2="79" y2="78" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="86" y1="70" x2="86" y2="79" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>
  <line x1="91" y1="69" x2="93" y2="78" stroke="#a5b4fc" stroke-width="2" stroke-linecap="round"/>

  <!-- AI spark star (outer) -->
  <polygon points="50,68 54,79 65,79 57,86 60,97 50,90 40,97 43,86 35,79 46,79" fill="#818cf8"/>

  <!-- AI spark star (inner highlight) -->
  <polygon points="50,73 53,81 60,81 54.5,85 56.5,93 50,89 43.5,93 45.5,85 40,81 47,81" fill="#ffffff" opacity="0.92"/>
</svg>